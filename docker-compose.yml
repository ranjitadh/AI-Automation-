version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: ai_sdr_postgres
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${DB_NAME:-ai_sdr_db}
      POSTGRES_USER: ${DB_USER:-ai_sdr_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    expose:
      - "5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-ai_sdr_user} -d ${DB_NAME:-ai_sdr_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ai_sdr_redis
    restart: unless-stopped
    expose:
      - "6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: ai_sdr_backend
    restart: unless-stopped
    command: gunicorn config.wsgi:application -w 4 -b 0.0.0.0:8000 --max-requests 1000 --max-requests-jitter 50 --timeout 120
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  celery_worker:
    build: ./backend
    container_name: ai_sdr_celery_worker
    restart: unless-stopped
    command: celery -A config worker -l info --concurrency=4 --max-memory-per-child=200000 --time-limit=600
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery_beat:
    build: ./backend
    container_name: ai_sdr_celery_beat
    restart: unless-stopped
    command: celery -A config beat -l info
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
